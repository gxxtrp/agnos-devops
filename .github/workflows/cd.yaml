name: CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/agnos-api
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/agnos-worker

jobs:
  update-image-tags:
    name: Update Image Tags in Git
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Update api image tag (all envs)
        run: |
          for env in dev uat prod; do
            sed -i "s|image: ghcr.io/.*/agnos-api:.*|image: ${{ env.API_IMAGE }}:${{ github.sha }}|g" \
              k8s/services/api/${env}/../../base/deployment.yaml 2>/dev/null || true
          done
          sed -i "s|image: ghcr.io/.*/agnos-api:.*|image: ${{ env.API_IMAGE }}:${{ github.sha }}|g" \
            k8s/services/api/base/deployment.yaml

      - name: Update worker image tag (all envs)
        run: |
          sed -i "s|image: ghcr.io/.*/agnos-worker:.*|image: ${{ env.WORKER_IMAGE }}:${{ github.sha }}|g" \
            k8s/services/worker/base/deployment.yaml

      - name: Commit and push updated tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/services/api/base/deployment.yaml
          git add k8s/services/worker/base/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push

  deploy-dev:
    name: Sync Dev via ArgoCD
    runs-on: ubuntu-latest
    needs: update-image-tags
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --grpc-web --insecure

      - name: Sync api-dev
        run: argocd app sync api-dev --timeout 120

      - name: Sync worker-dev
        run: argocd app sync worker-dev --timeout 120

      - name: Wait for api-dev healthy
        run: argocd app wait api-dev --health --timeout 120

      - name: Wait for worker-dev healthy
        run: argocd app wait worker-dev --health --timeout 120

  deploy-uat:
    name: Sync UAT via ArgoCD
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: uat  # manual approval gate
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --grpc-web --insecure

      - name: Sync api-uat
        run: argocd app sync api-uat --timeout 120

      - name: Sync worker-uat
        run: argocd app sync worker-uat --timeout 120

      - name: Wait for api-uat healthy
        run: argocd app wait api-uat --health --timeout 120

      - name: Wait for worker-uat healthy
        run: argocd app wait worker-uat --health --timeout 120

  deploy-prod:
    name: Sync Prod via ArgoCD
    runs-on: ubuntu-latest
    needs: deploy-uat
    environment: prod  # manual approval gate
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --grpc-web --insecure

      - name: Sync api-prod
        run: argocd app sync api-prod --timeout 180

      - name: Sync worker-prod
        run: argocd app sync worker-prod --timeout 180

      - name: Wait for api-prod healthy
        run: argocd app wait api-prod --health --timeout 180

      - name: Wait for worker-prod healthy
        run: argocd app wait worker-prod --health --timeout 180
