apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-uat
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: agnos
  source:
    repoURL: https://github.com/gxxtrp/agnos-devops.git
    targetRevision: main
    path: k8s/mysql
  destination:
    server: https://kubernetes.default.svc
    namespace: uat
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
