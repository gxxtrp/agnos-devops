global:
  domain: argocd.local

server:
  # Expose via port-forward on minikube; set to LoadBalancer for cloud
  service:
    type: ClusterIP
  # Disable TLS for local minikube (use --insecure in CLI)
  extraArgs:
    - --insecure

configs:
  params:
    server.insecure: true

  # Repository credentials — override via sealed-secrets or external-secrets in prod
  repositories: {}

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
