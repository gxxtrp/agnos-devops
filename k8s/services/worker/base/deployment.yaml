apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: worker-sa
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: ghcr.io/OWNER/agnos-worker:latest
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: mysql-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - cat
                - /tmp/worker-alive
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
