# IMPORTANT: Replace the placeholder base64 values below with real encoded secrets.
# To encode: echo -n 'your-value' | base64
# For production, consider using Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
# or an external secrets manager (e.g., AWS Secrets Manager, Vault) instead of storing
# raw base64 values in version control.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: prod
  labels:
    app: mysql
type: Opaque
data:
  # echo -n 'replace-with-root-password' | base64
  MYSQL_ROOT_PASSWORD: cmVwbGFjZS13aXRoLXJvb3QtcGFzc3dvcmQ=
  # echo -n 'agnos' | base64
  MYSQL_DATABASE: YWdub3M=
  # echo -n 'replace-with-db-user' | base64
  MYSQL_USER: cmVwbGFjZS13aXRoLWRiLXVzZXI=
  # echo -n 'replace-with-db-password' | base64
  MYSQL_PASSWORD: cmVwbGFjZS13aXRoLWRiLXBhc3N3b3Jk
  # DB_USER and DB_PASSWORD are used by api/worker services
  # echo -n 'replace-with-db-user' | base64
  DB_USER: cmVwbGFjZS13aXRoLWRiLXVzZXI=
  # echo -n 'replace-with-db-password' | base64
  DB_PASSWORD: cmVwbGFjZS13aXRoLWRiLXBhc3N3b3Jk
