# Role for api-sa: read configmaps and secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-role
  namespace: prod
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-rolebinding
  namespace: prod
subjects:
  - kind: ServiceAccount
    name: api-sa
    namespace: prod
roleRef:
  kind: Role
  name: api-role
  apiGroup: rbac.authorization.k8s.io
---
